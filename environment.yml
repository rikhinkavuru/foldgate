# Conda fallback for those not using pixi. NOTE: environment.yml alone is NOT
# reproducible (it does not lock the solved versions) -- prefer `pixi install`
# + committed pixi.lock. See CLAUDE.md.
name: foldgate
channels:
  - conda-forge
  - bioconda
dependencies:
  - python>=3.11,<3.13
  - numpy
  - pandas
  - scikit-learn
  - matplotlib
  - lightgbm          # conda-forge build: consistent OpenMP, avoids libomp segfault
  - rdkit
  - biotite
  - biopython
  - foldseek
  - usalign
  - dvc
  - pip
  - pip:
      - posebusters
      - crepes>=0.9.1
      - crepes-weighted>=0.1.3
      - mapie>=1.4
      - -e .
