name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: lint + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Create environment
        run: uv venv --python ${{ matrix.python-version }} .venv

      - name: Install the analysis toolchain (torch-free, CPU-only)
        # The conformal/selective core needs only numpy/pandas/scikit-learn/scipy.
        # rdkit/posebusters (feature computation) are intentionally excluded from CI:
        # the shippable reliability layer is torch-free and its tests do not need them.
        run: uv pip install --python .venv "numpy>=1.26" "pandas>=2.1" "scikit-learn>=1.4" "scipy>=1.11" pytest ruff

      - name: Ruff (lint)
        run: .venv/bin/ruff check src/ experiments/ tests/

      - name: Pytest (validity + sanity of the conformal core)
        run: .venv/bin/python -m pytest tests/ -q
